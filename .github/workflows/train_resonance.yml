name: Shadow Resonance - Process & Train

on:
  push:
    branches: [ main ]
    paths:
      - 'data/raw/audio_input/**'
  workflow_dispatch:

jobs:
  build-process-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-dev ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Añadimos basic-pitch para la conversión y mido para manejar los MIDI
        pip install tensorflow numpy pretty_midi librosa pydantic fastapi basic-pitch mido

    - name: Step 1 Convert MP3 to MIDI
      run: |
        mkdir -p data/raw/chiptune_action data/raw/chiptune_ambient
        python scripts/process_audio.py

    - name: Step 2 Run Training
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python scripts/train_composer.py

    - name: Step 3 Commit and Push (Model & MIDIs)
      run: |
        git config --global user.name "Shadow-Resonance-Bot"
        git config --global user.email "shadow-bot@users.noreply.github.com"

        # Añadimos el modelo actualizado
        git add -f app/models/saved/shadow_composer.keras
        
        # Opcional: Añadimos los MIDIs generados para que los tengas en tu repo
        git add data/raw/chiptune_action/*.mid
        git add data/raw/chiptune_ambient/*.mid

        if git diff --staged --quiet; then
          echo "No hay cambios detectados."
        else
          git commit -m "🤖 [Automated] Retrained with Undertale & Megaman Zero (MP3 to MIDI)"
          git push
        fi

