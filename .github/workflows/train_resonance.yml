name: Shadow Resonance - Process & Train

on:
  push:
    branches: [ main ]
    paths:
      - 'data/raw/audio_input/**'
      - '.github/workflows/**' # Para que se active si cambias este archivo
  workflow_dispatch:

jobs:
  build-process-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # <--- CACHÉ DE LIBRERÍAS DE PYTHON

    - name: Install System Dependencies
      # Usamos un truco para no actualizar todo el sistema si no es necesario
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y libasound2-dev libjack-dev ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Usamos comillas para evitar que el símbolo < rompa el script
        pip install tensorflow==2.15.0 
        pip install "numpy<2.0.0"
        pip install "basic-pitch[onnx]"
        pip install pretty_midi librosa pydantic fastapi mido

    - name: Step 1 Convert MP3 to MIDI (Smart Skip)
      continue-on-error: true # <--- Si una canción falla, que intente entrenar con las que sí funcionen
      run: |
        mkdir -p data/raw/chiptune_action data/raw/chiptune_ambient
        python scripts/process_audio.py

    - name: Step 2 Run Training
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python scripts/train_composer.py

    - name: Step 3 Commit and Push (Model & MIDIs)
      run: |
        git config --global user.name "Shadow-Resonance-Bot"
        git config --global user.email "shadow-bot@users.noreply.github.com"

        # Forzamos la subida de los archivos clave
        git add -f app/models/saved/shadow_composer.keras
        git add -f data/raw/chiptune_action/*.mid
        git add -f data/raw/chiptune_ambient/*.mid

        # Solo hacemos commit si realmente hubo cambios (evita errores)
        git diff --staged --quiet || (git commit -m "🤖 [Automated] Sync Model & MIDIs" && git push)

